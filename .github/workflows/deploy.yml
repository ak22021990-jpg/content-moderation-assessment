name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Verify LFS objects
        run: git lfs ls-files

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Generate sprites + WebVTT files
        run: node scripts/generate-sprites.mjs

      - name: Verify generated assets
        run: |
          test -f public/sprites/v01_sprite.jpg || (echo "Missing sprite.jpg" && exit 1)
          test -f public/vtt/v01.thumbs.vtt || (echo "Missing thumbs.vtt" && exit 1)
          test -f public/vtt/v01.chapters.vtt || (echo "Missing chapters.vtt" && exit 1)

      - name: Verify sprite is real JPEG (not LFS pointer)
        run: |
          file public/sprites/v01_sprite.jpg | grep -q "JPEG" || (echo "Sprite is not a real JPEG" && exit 1)

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
